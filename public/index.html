<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Admin API</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 p-8">
  <div class="max-w-3xl mx-auto text-center">
    <h1 class="text-3xl font-bold mb-4">📁 Portfolio Admin API</h1>
    <p class="mb-6 text-gray-700">
      This is the backend admin dashboard for managing your portfolio projects and skills.
      Built with Node.js, Express, MongoDB, Pug, and Tailwind CSS.
    </p>

    <div class="space-y-2">
      <a href="/admin/skills" class="inline-block px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">Go to Skills Admin</a><br>
      <a href="/admin/projects" class="inline-block px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">Go to Projects Admin</a><br>
      <a href="/api/skills" class="inline-block px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-900">View Skills JSON</a><br>
      <a href="/api/projects" class="inline-block px-4 py-2 bg-gray-800 text-white rounded hover:bg-gray-900">View Projects JSON</a>
    </div>
  </div>
</body>
</html>
